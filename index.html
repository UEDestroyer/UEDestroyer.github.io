<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagmaNode Control</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2d2d2d;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        #status {
            margin-top: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Управление сервером</h2>
    <input type="password" id="passwordInput" placeholder="Введите пароль">
    <button onclick="startServer()">START SERVER</button>
    <div id="status"></div>
</div>

<script>
async function startServer() {
    const inputPass = document.getElementById('passwordInput').value;
    const statusDiv = document.getElementById('status');

    // ЗАМЕНИ НА СВОЮ ССЫЛКУ ИЗ ПАНЕЛИ RENDER (она должна быть в кавычках!)
    const RENDER_URL = 'https://magmanode.onrender.com'; 

    if (!inputPass) {
        statusDiv.innerText = 'Введите пароль!';
        return;
    }

    statusDiv.style.color = '#ffeb3b';
    statusDiv.innerText = 'Связываюсь с бэкендом...';

    try {
        const response = await fetch(`${RENDER_URL}/start-my-server`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ password: inputPass })
        });

        // Обработка ответов от твоего Node.js сервера
        if (response.status === 204 || response.ok) {
            statusDiv.style.color = '#4CAF50';
            statusDiv.innerText = 'Сервер успешно запускается!';
        } else if (response.status === 403) {
            statusDiv.style.color = '#ff4d4d';
            statusDiv.innerText = 'Ошибка: Неверный пароль dagaTop';
        } else {
            statusDiv.style.color = '#ff4d4d';
            statusDiv.innerText = 'Ошибка бэкенда: ' + response.status;
        }
    } catch (error) {
        statusDiv.style.color = '#ff4d4d';
        // На бесплатном тарифе Render сервер спит, если его не трогали 15 минут
        statusDiv.innerText = 'Бэкенд просыпается... Подождите 30 секунд и нажмите еще раз.';
        console.error('Ошибка:', error);
    }
}
</script>

</body>
</html>
